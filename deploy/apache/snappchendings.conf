# Apache Virtual Host – SnappchenDings
# Template: replace YOUR_DOMAIN with your actual domain before using.
#
# SECURITY: Do NOT commit real credentials or private key paths.
# Place this file at: /etc/apache2/sites-available/snappchendings.conf
# Enable with: sudo a2ensite snappchendings.conf
# Always run:  sudo apachectl configtest  before reloading Apache.

<VirtualHost *:80>
    ServerName YOUR_DOMAIN
    ServerAlias www.YOUR_DOMAIN

    DocumentRoot /var/www/snappchendings

    <Directory /var/www/snappchendings>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Logging – adjust paths if your distro uses different locations
    ErrorLog  ${APACHE_LOG_DIR}/snappchendings-error.log
    CustomLog ${APACHE_LOG_DIR}/snappchendings-access.log combined

    # Let's Encrypt / Certbot will append a redirect block here automatically.
    # Run: sudo certbot --apache -d YOUR_DOMAIN
</VirtualHost>

# NOTE: After running certbot --apache, a second <VirtualHost *:443> block
# will be appended automatically by Certbot. Do not edit that block manually.
