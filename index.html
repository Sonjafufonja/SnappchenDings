<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnappchenDings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #c25200;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    header h1 { font-size: 1.4rem; }

    main {
      max-width: 640px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .add-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .add-form input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    .add-form button {
      padding: 0.6rem 1.1rem;
      background: #c25200;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    .add-form button:hover { background: #a04400; }

    .tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.5rem;
      border: 2px solid #c25200;
      background: transparent;
      color: #c25200;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active {
      background: #c25200;
      color: #fff;
    }

    ul#item-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    li.item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: opacity 0.2s;
    }
    li.item.hab { border-color: #4caf50; background: #f0fff0; }

    .item-name { flex: 1; font-size: 1rem; }
    li.item.hab .item-name { text-decoration: line-through; color: #777; }

    .btn-hab {
      padding: 0.35rem 0.75rem;
      border-radius: 5px;
      border: 1.5px solid #4caf50;
      background: transparent;
      color: #4caf50;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    li.item.hab .btn-hab {
      background: #4caf50;
      color: #fff;
    }
    .btn-hab:hover { opacity: 0.8; }

    .btn-delete {
      padding: 0.35rem 0.6rem;
      border-radius: 5px;
      border: 1.5px solid #e53935;
      background: transparent;
      color: #e53935;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-delete:hover { background: #e53935; color: #fff; }

    .empty-msg {
      text-align: center;
      color: #999;
      font-size: 0.95rem;
      padding: 2rem 0;
    }
  </style>
</head>
<body>

<header>
  <span aria-hidden="true">🏷️</span>
  <h1>SnappchenDings</h1>
  <nav style="margin-left:auto"><a href="reise.html" style="color:#fff;text-decoration:none;font-size:0.9rem;opacity:0.85;padding:0.3rem 0.7rem;border:1px solid rgba(255,255,255,0.4);border-radius:5px;">✈️ Reise-Deals</a></nav>
</header>

<main>
  <form class="add-form" id="add-form" aria-label="Artikel hinzufügen">
    <input
      type="text"
      id="new-item-input"
      placeholder="Artikel eingeben …"
      autocomplete="off"
      maxlength="120"
      required
      aria-label="Neuer Artikel"
    />
    <button type="submit">Hinzufügen</button>
  </form>

  <div class="tabs" role="tablist" aria-label="Ansicht wählen">
    <button class="tab-btn active" role="tab" aria-selected="true"  data-filter="all">Alle</button>
    <button class="tab-btn"        role="tab" aria-selected="false" data-filter="wish">Wunschliste</button>
    <button class="tab-btn"        role="tab" aria-selected="false" data-filter="hab">Hab ✔</button>
  </div>

  <ul id="item-list" aria-label="Artikelliste" aria-live="polite"></ul>
  <p class="empty-msg" id="empty-msg" hidden>Keine Artikel vorhanden.</p>
</main>

<script>
  const STORAGE_KEY = 'snappchen-items';
  let filter = 'all';

  function loadItems() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  function saveItems(items) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function render() {
    const items = loadItems();
    const list = document.getElementById('item-list');
    const emptyMsg = document.getElementById('empty-msg');

    const visible = items.filter(item => {
      if (filter === 'hab')  return item.hab;
      if (filter === 'wish') return !item.hab;
      return true;
    });

    list.replaceChildren();

    if (visible.length === 0) {
      emptyMsg.hidden = false;
      return;
    }
    emptyMsg.hidden = true;

    visible.forEach(item => {
      const li = document.createElement('li');
      li.className = 'item' + (item.hab ? ' hab' : '');
      li.dataset.id = item.id;

      const name = document.createElement('span');
      name.className = 'item-name';
      name.textContent = item.name;

      const habBtn = document.createElement('button');
      habBtn.className = 'btn-hab';
      habBtn.textContent = item.hab ? 'Hab ✔' : 'Hab';
      habBtn.setAttribute('aria-label', item.hab ? 'Als nicht besessen markieren' : 'Als besessen markieren');
      habBtn.addEventListener('click', () => toggleHab(item.id));

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete';
      delBtn.textContent = '✕';
      delBtn.setAttribute('aria-label', 'Artikel löschen');
      delBtn.addEventListener('click', () => deleteItem(item.id));

      li.appendChild(name);
      li.appendChild(habBtn);
      li.appendChild(delBtn);
      list.appendChild(li);
    });
  }

  function addItem(name) {
    const items = loadItems();
    items.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2, 7), name: name.trim(), hab: false });
    saveItems(items);
    render();
  }

  function toggleHab(id) {
    const items = loadItems();
    const item = items.find(i => i.id === id);
    if (item) item.hab = !item.hab;
    saveItems(items);
    render();
  }

  function deleteItem(id) {
    saveItems(loadItems().filter(i => i.id !== id));
    render();
  }

  document.getElementById('add-form').addEventListener('submit', e => {
    e.preventDefault();
    const input = document.getElementById('new-item-input');
    if (input.value.trim()) {
      addItem(input.value);
      input.value = '';
    }
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b === btn);
        b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
      });
      render();
    });
  });

  render();
</script>

</body>
</html>
